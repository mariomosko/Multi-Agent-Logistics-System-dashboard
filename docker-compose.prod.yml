name: logistics-prod

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"              # internal only — nginx proxies externally
    volumes:
      - db_data:/data
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/logistics.db
      APP_ENV: production
      LOG_LEVEL: INFO
      SEED_ON_EMPTY: "true"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: .              # root context so nginx.conf is in scope
      dockerfile: dashboard/Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
    name: logistics_db_prod
