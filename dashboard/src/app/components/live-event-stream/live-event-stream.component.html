<div class="flex flex-col h-full">
  <div class="flex items-center justify-between mb-3">
    <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wider">Live Event Stream</h2>
    <span class="text-xs text-gray-400">{{ exceptions.length }} total</span>
  </div>

  <div class="flex-1 overflow-y-auto space-y-1.5 pr-1">
    <p *ngIf="recent.length === 0" class="text-xs text-gray-400 text-center mt-8">Waiting for events…</p>

    <div
      *ngFor="let exc of recent"
      class="flex items-center gap-2 px-3 py-2 rounded-lg bg-gray-50 border border-gray-100 text-xs"
    >
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2">
          <span class="font-mono text-gray-500 truncate">{{ exc.tracking_number }}</span>
          <span class="text-gray-300">·</span>
          <span class="text-gray-500">{{ exc.carrier }}</span>
        </div>
        <div class="text-gray-600 truncate mt-0.5">{{ exc.exception_type.replace('_', ' ') }}</div>
      </div>

      <div class="flex flex-col items-end gap-1 shrink-0">
        <span class="px-1.5 py-0.5 rounded text-xs font-medium" [ngClass]="severityClass(exc.severity)">
          {{ exc.severity }}
        </span>
        <span class="inline-flex items-center gap-1 text-xs font-medium" [ngClass]="statusTextClass(exc.workflow_status)">
          <span class="w-1.5 h-1.5 rounded-full bg-current" [class.animate-pulse]="statusDotPulse(exc.workflow_status)"></span>
          {{ exc.workflow_status }}
        </span>
      </div>
    </div>
  </div>
</div>
